<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>guff</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text-dim:#8b949e;--accent:#58a6ff;--accent-dim:#1f6feb;--green:#3fb950;--red:#f85149;--yellow:#d29922;--font:system-ui,-apple-system,sans-serif;--mono:'SF Mono',Consolas,monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}

/* Sidebar */
.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sidebar-header h1{font-size:18px;font-weight:700;color:var(--accent)}
.sidebar-header .version{font-size:11px;color:var(--text-dim);background:var(--bg);padding:2px 6px;border-radius:4px}
.sidebar-section{padding:12px 16px}
.sidebar-section h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:8px}
.status-grid{display:grid;gap:8px}
.status-item{display:flex;justify-content:space-between;align-items:center;font-size:13px}
.status-item .label{color:var(--text-dim)}
.status-item .value{color:var(--text);font-family:var(--mono);font-size:12px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.on{background:var(--green)}
.status-dot.off{background:var(--text-dim)}
.tools-list{list-style:none;font-size:12px;color:var(--text-dim)}
.tools-list li{padding:3px 0;border-bottom:1px solid var(--border)}
.tools-list li:last-child{border-bottom:none}
.tools-list .tool-name{color:var(--accent);font-family:var(--mono)}

/* Controls */
.controls{padding:12px 16px;border-top:1px solid var(--border)}
.control-group{margin-bottom:10px}
.control-group label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-bottom:4px}
.control-group label span{font-family:var(--mono);color:var(--text)}
select,input[type=range]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px}
select{padding:6px 8px;cursor:pointer}
input[type=range]{-webkit-appearance:none;height:4px;border:none;border-radius:2px;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--accent);border-radius:50%;cursor:pointer}

/* Main chat area */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-messages{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:12px}
.message{max-width:85%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;word-wrap:break-word;white-space:pre-wrap}
.message.user{align-self:flex-end;background:var(--accent-dim);color:#fff;border-bottom-right-radius:4px}
.message.assistant{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.message.system{align-self:center;background:transparent;color:var(--text-dim);font-size:12px;font-style:italic}
.message .tool-call{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin:6px 0;font-family:var(--mono);font-size:12px;color:var(--yellow)}
.message .tool-call .tool-label{color:var(--accent);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.message code{background:var(--bg);padding:2px 5px;border-radius:3px;font-family:var(--mono);font-size:13px}
.message pre{background:var(--bg);padding:10px;border-radius:6px;overflow-x:auto;margin:6px 0}
.message pre code{padding:0;background:none}
.typing{display:inline-block;width:6px;height:16px;background:var(--accent);animation:blink 1s infinite;vertical-align:middle;margin-left:2px;border-radius:1px}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}

/* Input area */
.input-area{padding:12px 24px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end}
.input-area textarea{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;font-size:14px;font-family:var(--font);resize:none;max-height:200px;line-height:1.5;outline:none;transition:border-color .2s}
.input-area textarea:focus{border-color:var(--accent)}
.input-area button{background:var(--accent);border:none;color:#fff;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;white-space:nowrap;transition:background .2s}
.input-area button:hover{background:#79c0ff}
.input-area button:disabled{background:var(--border);cursor:not-allowed}

/* Responsive */
@media(max-width:768px){.sidebar{display:none}.chat-messages{padding:12px}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>guff</h1>
    <span class="version">local LLM</span>
  </div>

  <div class="sidebar-section">
    <h3>Model</h3>
    <select id="modelSelect"><option value="">Loading...</option></select>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Temperature <span id="tempVal">0.8</span></label>
      <input type="range" id="temperature" min="0" max="2" step="0.05" value="0.8">
    </div>
    <div class="control-group">
      <label>Top-P <span id="topPVal">0.9</span></label>
      <input type="range" id="topP" min="0" max="1" step="0.05" value="0.9">
    </div>
    <div class="control-group">
      <label>Top-K <span id="topKVal">40</span></label>
      <input type="range" id="topK" min="0" max="200" step="1" value="40">
    </div>
    <div class="control-group">
      <label>Max Tokens <span id="maxTokVal">2048</span></label>
      <input type="range" id="maxTokens" min="64" max="8192" step="64" value="2048">
    </div>
  </div>

  <div class="sidebar-section" id="statusSection">
    <h3>Status</h3>
    <div class="status-grid" id="statusGrid">
      <div class="status-item"><span class="label">Server</span><span class="value"><span class="status-dot on"></span>Online</span></div>
    </div>
  </div>

  <div class="sidebar-section" id="toolsSection" style="display:none">
    <h3>Tools</h3>
    <ul class="tools-list" id="toolsList"></ul>
  </div>
</div>

<div class="main">
  <div class="chat-messages" id="messages">
    <div class="message system">Send a message to start chatting. Select a model from the sidebar.</div>
  </div>
  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Send a message..." autofocus></textarea>
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const messagesEl = $('#messages');
const inputEl = $('#input');
const sendBtn = $('#sendBtn');
const modelSelect = $('#modelSelect');

let chatHistory = [];
let streaming = false;

// Slider wiring
['temperature','topP','topK','maxTokens'].forEach(id => {
  const el = $(`#${id}`);
  const valId = {temperature:'tempVal',topP:'topPVal',topK:'topKVal',maxTokens:'maxTokVal'}[id];
  el.addEventListener('input', () => $(`#${valId}`).textContent = el.value);
});

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});

// Send on Enter (Shift+Enter for newline)
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

// Load models
async function loadModels() {
  try {
    const resp = await fetch('/v1/models');
    const data = await resp.json();
    modelSelect.innerHTML = '';
    if (data.data && data.data.length > 0) {
      data.data.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id; opt.textContent = m.id;
        modelSelect.appendChild(opt);
      });
    } else {
      modelSelect.innerHTML = '<option value="">No models</option>';
    }
  } catch(e) {
    modelSelect.innerHTML = '<option value="">Error loading</option>';
  }
}

// Load status
async function loadStatus() {
  try {
    const resp = await fetch('/api/status');
    const data = await resp.json();
    const grid = $('#statusGrid');
    grid.innerHTML = `
      <div class="status-item"><span class="label">Server</span><span class="value"><span class="status-dot on"></span>Online</span></div>
      ${data.model ? `<div class="status-item"><span class="label">Model</span><span class="value">${data.model}</span></div>` : ''}
      ${data.gpu ? `<div class="status-item"><span class="label">GPU</span><span class="value"><span class="status-dot on"></span>${data.gpu}</span></div>` : ''}
      <div class="status-item"><span class="label">Tools</span><span class="value">${data.tools_count || 0}</span></div>
      ${data.uptime ? `<div class="status-item"><span class="label">Uptime</span><span class="value">${data.uptime}</span></div>` : ''}
    `;
  } catch(e) { /* ignore */ }
}

// Load tools
async function loadTools() {
  try {
    const resp = await fetch('/api/tools');
    const data = await resp.json();
    if (data.tools && data.tools.length > 0) {
      $('#toolsSection').style.display = '';
      const list = $('#toolsList');
      list.innerHTML = data.tools.map(t =>
        `<li><span class="tool-name">${t.name}</span> &mdash; ${t.description}</li>`
      ).join('');
    }
  } catch(e) { /* ignore */ }
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = formatContent(content);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function formatContent(text) {
  // Detect tool call blocks
  text = text.replace(/```json\s*\n(\{[^`]*?"tool"\s*:.*?\})\s*\n```/gs, (match, json) => {
    try {
      const obj = JSON.parse(json);
      if (obj.tool) {
        return `<div class="tool-call"><div class="tool-label">Tool Call: ${obj.tool}</div>${JSON.stringify(obj.arguments, null, 2)}</div>`;
      }
    } catch(e) {}
    return `<pre><code>${escHtml(json)}</code></pre>`;
  });
  // Code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escHtml(code.trim())}</code></pre>`);
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  return text;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || streaming) return;

  const model = modelSelect.value;
  if (!model) { addMessage('system', 'Please select a model first.'); return; }

  streaming = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMessage('user', escHtml(text));
  chatHistory.push({role: 'user', content: text});

  const assistantDiv = addMessage('assistant', '<span class="typing"></span>');
  let fullText = '';

  try {
    const resp = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: model,
        messages: chatHistory,
        stream: true,
        temperature: parseFloat($('#temperature').value),
        top_p: parseFloat($('#topP').value),
        max_tokens: parseInt($('#maxTokens').value),
      }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6);
        if (payload === '[DONE]') break;
        try {
          const chunk = JSON.parse(payload);
          if (chunk.choices && chunk.choices[0].delta) {
            fullText += chunk.choices[0].delta.content || '';
            assistantDiv.innerHTML = formatContent(fullText) + '<span class="typing"></span>';
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    fullText = `Error: ${e.message}`;
  }

  assistantDiv.innerHTML = formatContent(fullText || '(empty response)');
  chatHistory.push({role: 'assistant', content: fullText});
  messagesEl.scrollTop = messagesEl.scrollHeight;
  streaming = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// Init
loadModels();
loadStatus();
loadTools();
setInterval(loadStatus, 30000);
</script>
</body>
</html>
